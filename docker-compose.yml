services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - stellarator-data:/data
      - ./backend:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  supervisor:
    build:
      context: .
      dockerfile: docker/supervisor.Dockerfile
    env_file: .env
    environment:
      # Override .env's +aiosqlite URL — sqlx doesn't understand that driver suffix.
      # mode=rwc creates the file if missing (in case backend hasn't initialized yet).
      STELLARATOR_DB_URL: "sqlite:////data/stellarator.db?mode=rwc"
    ports:
      - "8001:8001"
    volumes:
      - stellarator-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8001 && echo -e 'GET /healthz HTTP/1.1\\r\\nHost: x\\r\\n\\r\\n' >&3 && head -c 12 <&3 | grep -q '200 OK'"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      backend:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    restart: unless-stopped
    profiles:
      - observability

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    profiles:
      - observability

volumes:
  stellarator-data:
  prometheus-data:
  grafana-data:
